<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../stylesheet.css">
    <link rel="stylesheet" href="../../typewriter.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familylike</title>
</head>
<body>
<div class="main-content">
    <div class="countdown-container">
        <!-- The title can be changed to whatever you are counting down to -->
        <div class="typewriter">
            <h1 id="countdown-title">We're still setting things up...</h1>
        </div>

        <!-- This div will hold the timer boxes -->
        <div id="timer">
            <div class="time-box">
                <span id="days">0</span>
                <p>Days</p>
            </div>
            <div class="time-box">
                <span id="hours">0</span>
                <p>Hours</p>
            </div>
            <div class="time-box">
                <span id="minutes">0</span>
                <p>Minutes</p>
            </div>
            <div class="time-box">
                <span id="seconds">0</span>
                <p>Seconds</p>
            </div>
        </div>
        <!-- This div will be shown when the countdown is over -->
        <div id="expired-message" style="display: none;">
            The new Site is loading...
        </div>
    </div>

    <div class="polaroid-gallery">
        <a href="spot/index.html">
            <img src="https://placehold.co/300x200" alt="img">
            <p>Aufklärung Spot</p>
        </a>
        <a href="pai">
            <img src="https://placehold.co/300x200" alt="img">
            <p>Professional / Administrative / Institutional</p>
        </a>
        <a href="agriculture">
            <img src="https://placehold.co/300x200" alt="img">
            <p>Ecological Agriculture</p>
        </a>
        <a href="social">
            <img src="https://placehold.co/300x200" alt="img">
            <p>Social</p>
        </a>
        <a href="environmental">
            <img src="https://placehold.co/300x200" alt="img">
            <p>Environmental</p>
        </a>
        <a href="estate">
            <img src="https://placehold.co/300x200" alt="img">
            <p>Estate</p>
        </a>
    </div>
</div>

<div class="footer">
    <a href="#">Impressum</a>
    <a href="#">Datenschutz</a>
</div>
</body>

<script src="../../countdown.js"></script>
</html>
